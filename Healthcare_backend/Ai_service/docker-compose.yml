version: "3.9"

services:


  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage


  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/reform-william-center-vibrate-press-5829


  redis-stack:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"   # Redis
      - "8001:8001"   # Redis UI
    volumes:
      - redis_data:/data

# 💾 Persistent Volumes
volumes:
  qdrant_data:
  neo4j_data:
  redis_data: